# .github/workflows/release.yml
#
# Triggered when you push a tag like v1.0.0
# Builds the Windows installer and publishes it as a GitHub Release.
#
# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   GH_TOKEN  — Personal Access Token with repo scope
#               (or use the auto-generated GITHUB_TOKEN)

name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'          # Triggers on tags: v1.0.0, v1.2.3, etc.

  workflow_dispatch:       # Allows manual trigger from GitHub UI
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: write          # Needed to create GitHub Releases

jobs:
  # ── Windows Build ──────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

      # Upload artifacts even if publish is skipped (for inspection)
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-dist
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          retention-days: 7

  # ── Optional: macOS Build ─────────────────────────────────────────────────
  # Uncomment when ready for Mac support
  #
  # build-macos:
  #   name: Build macOS
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with: { node-version: '20', cache: 'npm' }
  #     - run: npm ci
  #     - run: npm run build:mac
  #       env:
  #         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #         CSC_IDENTITY_AUTO_DISCOVERY: false  # Skip code-signing for now

  # ── Release Notes (auto-generated) ───────────────────────────────────────
  create-release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Release with notes
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          name: "Device Doctor v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Device Doctor v${{ steps.version.outputs.VERSION }}

            ### Installation
            - **Setup (recommended):** Download `Device Doctor Setup ${{ steps.version.outputs.VERSION }}.exe` and run it.
            - **Portable:** Download `Device Doctor Portable ${{ steps.version.outputs.VERSION }}.exe` — no installation needed.

            ### Auto-Update
            If you already have Device Doctor installed, it will detect this update automatically within a few minutes and prompt you to restart.

            ---
            *Built with Electron on Windows.*
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
